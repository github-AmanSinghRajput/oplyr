name: Backend CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend checks
        run: npm run check:backend

      - name: Build backend workspaces
        run: npm run build:backend
